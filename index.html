<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="點點英雄禮品碼批量兌換工具，一次輸入多組兌換碼，依序自動處理">
  <title>禮品碼批量兌換 · 點點英雄</title>
  <style>
    @font-face {
      font-family: 'CookieRun';
      src: url('https://dicero.habby.com/gift/static/fonts/CookieRun_Bold.0033523.woff') format('woff');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'CookieRun', 'Segoe UI', sans-serif;
      background: url('https://dicero.habby.com/gift/static/img/bg.cbbba74.png') center / cover fixed;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    /* ── 雙欄外框 ── */
    .layout {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      width: 100%;
      max-width: 660px;
    }

    /* ── 面板通用樣式 ── */
    .panel {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 2px 6px rgba(0,0,0,0.3);
    }
    .main-panel  { flex: 1; min-width: 0; }
    .aside-panel { width: 170px; flex-shrink: 0; }

    .panel-header {
      background: #d96e12;
      padding: 13px 16px 11px;
      border-bottom: 3px solid #a84e08;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-header h1 {
      font-size: 16px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
      flex: 1;
    }
    .panel-header h2 {
      font-size: 13px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
    }
    .panel-header .tag {
      font-size: 10px;
      background: rgba(0,0,0,0.2);
      color: #ffd98a;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .panel-body {
      background: #fdf0d0;
      padding: 18px 16px 16px;
    }

    /* ── 輸入欄位 ── */
    .field { margin-bottom: 13px; }

    label {
      display: block;
      font-size: 11px;
      color: #8a5c28;
      margin-bottom: 5px;
      letter-spacing: 0.3px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 9px 11px;
      background: #fff8ec;
      border: 1.5px solid #c8943a;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      color: #2e1a08;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    textarea:focus { border-color: #d96e12; }
    input.error, textarea.error { border-color: #c02010; }
    textarea { resize: vertical; line-height: 1.6; }

    /* ── 按鈕 ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: filter 0.12s;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(2px); }

    .btn-orange {
      background: #d96e12;
      color: #fff;
      box-shadow: 0 3px 0 #8a4208;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .btn-orange:hover  { filter: brightness(1.07); }
    .btn-orange:active { box-shadow: none; }
    .btn-orange:disabled {
      background: #c8a878; box-shadow: none;
      color: #f0debb; cursor: not-allowed; transform: none;
    }

    .btn-tan {
      background: #c8943a; color: #fff8ec;
      box-shadow: 0 3px 0 #7a5010;
    }
    .btn-tan:hover  { filter: brightness(1.07); }
    .btn-tan:active { box-shadow: none; }

    .btn-ghost {
      background: transparent;
      color: #8a5c28;
      border: 1.5px solid #c8943a;
    }
    .btn-ghost:hover { background: #f5e0b0; }

    .btn-red {
      background: #c02010; color: #fff;
      box-shadow: 0 3px 0 #7a1008;
    }
    .btn-red:hover  { filter: brightness(1.1); }
    .btn-red:active { box-shadow: none; }

    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    /* ── 禮包碼列表（右側）── */
    .preset-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .preset-item {
      display: flex;
      align-items: center;
      gap: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1.5px solid #c8943a;
      cursor: pointer;
      transition: border-color 0.15s;
      background: #fff8ec;
    }
    .preset-item:hover { border-color: #d96e12; }

    /* 勾選狀態 */
    .preset-item.active {
      border-color: #d96e12;
      background: #fde8c0;
    }

    .preset-check {
      width: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #c8943a;
      border-right: 1px solid #e0b870;
      align-self: stretch;
      background: rgba(200,148,58,0.08);
      transition: background 0.15s, color 0.15s;
    }
    .preset-item.active .preset-check {
      background: #d96e12;
      color: #fff;
      border-right-color: #a84e08;
    }

    .preset-code-text {
      flex: 1;
      padding: 8px 8px;
      font-size: 12px;
      color: #3a2010;
      word-break: break-all;
      line-height: 1.3;
    }

    .preset-hint {
      font-size: 10px;
      color: #9a7040;
      margin-top: 10px;
      text-align: center;
      line-height: 1.5;
    }

    /* ── 進度條 ── */
    #process-section { display: none; }

    .progress-wrap {
      height: 6px; background: #e8c878;
      border-radius: 3px; overflow: hidden; margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%; background: #d96e12;
      border-radius: 3px; transition: width 0.3s ease; width: 0%;
    }
    .progress-text { font-size: 11px; color: #9a6a30; margin-bottom: 13px; }

    /* ── 驗證碼區 ── */
    .captcha-panel {
      background: #fff8ec;
      border: 1.5px solid #c8943a;
      border-radius: 10px;
      padding: 13px;
      margin-bottom: 13px;
    }
    .code-badge-label {
      font-size: 10px; color: #9a6a30;
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 3px;
    }
    .code-badge {
      font-size: 14px; color: #2e1a08;
      font-weight: bold; margin-bottom: 11px; word-break: break-all;
    }
    .captcha-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    #captcha-img {
      height: 42px; min-width: 90px;
      border-radius: 6px; border: 1.5px solid #c8943a;
      background: #fff; cursor: pointer;
    }
    .hint { font-size: 10px; color: #b07840; margin-top: 6px; }

    /* ── 結果 ── */
    .results-wrap {
      background: #fff8ec; border: 1.5px solid #c8943a;
      border-radius: 8px; padding: 10px 12px;
      max-height: 200px; overflow-y: auto;
      margin-bottom: 12px; display: none;
    }
    .results-title {
      font-size: 10px; color: #9a6a30;
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px;
    }
    .result-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 6px 8px; margin-bottom: 3px; border-radius: 6px; font-size: 12px;
    }
    .result-item.success { background: #d8f0dc; border-left: 3px solid #3a9048; }
    .result-item.fail    { background: #f8d8d0; border-left: 3px solid #c03020; }
    .result-item.skipped { background: #ede8d8; border-left: 3px solid #b09050; }
    .result-code { color: #2e1a08; font-size: 12px; word-break: break-all; }
    .result-msg  { color: #7a5028; font-size: 11px; margin-top: 1px; }

    .done-banner {
      background: #d8f0dc; border: 1.5px solid #3a9048;
      border-radius: 8px; padding: 11px;
      text-align: center; color: #1e6030; font-size: 13px;
      margin-bottom: 12px; display: none;
    }

    .cors-box {
      background: #fff3cd; border: 1.5px solid #d4a030;
      border-radius: 8px; padding: 11px 13px;
      font-size: 12px; color: #7a5010; margin-top: 13px; display: none;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f5e8c0; }
    ::-webkit-scrollbar-thumb { background: #c8943a; border-radius: 2px; }

    /* ── 社群碼區塊 ── */
    .section-label {
      font-size: 10px; color: #9a6a30; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 7px;
    }
    .panel-divider {
      border: none; border-top: 1px solid #ddc07a; margin: 11px 0;
    }
    #community-list { margin-bottom: 2px; }
    .community-item {
      padding: 7px 9px; border-radius: 7px; margin-bottom: 5px;
      background: #fff8ec; border: 1.5px solid #e0c070;
      cursor: pointer; transition: border-color 0.12s;
    }
    .community-item:hover:not(.expired) { border-color: #d96e12; }
    .community-item.expired { opacity: 0.55; cursor: default; }
    .comm-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .comm-badge {
      font-size: 9px; padding: 1px 6px; border-radius: 10px; flex-shrink: 0;
    }
    .badge-valid   { background: #d8f0dc; color: #2a6030; }
    .badge-unknown { background: #fde8c0; color: #8a4a10; }
    .badge-expired { background: #e8e0d0; color: #6a5a40; }
    .comm-code { font-size: 12px; color: #2e1a08; word-break: break-all; }
    .comm-meta { font-size: 10px; color: #9a7050; margin-top: 2px; }
    #community-loading { font-size: 11px; color: #9a7040; padding: 4px 0; }
    .btn-add-link {
      display: block; width: 100%; margin-top: 6px;
      padding: 7px; border-radius: 7px; border: 1.5px dashed #c8943a;
      background: transparent; color: #9a6a30; font-family: inherit;
      font-size: 11px; cursor: pointer; text-align: center;
    }
    .btn-add-link:hover { background: #f5e8c0; border-style: solid; }

    /* ── RWD：窄螢幕垂直堆疊 ── */
    @media (max-width: 520px) {
      .layout { flex-direction: column; }
      .aside-panel { width: 100%; }
      .preset-list { flex-direction: row; flex-wrap: wrap; }
      .preset-item { flex: 1; min-width: 120px; }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ══ 左側主面板 ══ -->
  <div class="panel main-panel">
    <div class="panel-header">
      <h1>禮品碼批量兌換</h1>
      <span class="tag">點點英雄</span>
    </div>
    <div class="panel-body">

      <!-- 輸入區 -->
      <div id="input-section">
        <div class="field">
          <label>玩家 ID</label>
          <input type="text" id="uid-input" placeholder="例：12345 或 1-12345678">
        </div>
        <div class="field">
          <label>兌換碼（每行一組）</label>
          <textarea id="codes-input" rows="7"
            placeholder="HABBY2024ABC&#10;DICERO0518XY&#10;GIFT999CODE"></textarea>
        </div>
        <div class="btn-row">
          <button class="btn btn-orange" id="start-btn">開始兌換</button>
        </div>
      </div>

      <!-- 處理區 -->
      <div id="process-section">
        <div class="progress-wrap">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">準備中…</div>

        <div class="captcha-panel" id="captcha-panel">
          <div class="code-badge-label">目前兌換碼</div>
          <div class="code-badge" id="current-code">—</div>
          <div class="captcha-row">
            <img id="captcha-img" src="" alt="驗證碼" title="點擊換一張">
            <button class="btn btn-ghost" id="refresh-btn" style="padding:7px 11px;font-size:12px;">換一張</button>
          </div>
          <div class="field" style="margin-bottom:10px;">
            <label>驗證碼</label>
            <input type="text" id="captcha-input" placeholder="輸入圖片中的文字" autocomplete="off">
          </div>
          <div class="btn-row">
            <button class="btn btn-orange" id="submit-btn">確認兌換</button>
            <button class="btn btn-ghost"  id="skip-btn">跳過</button>
          </div>
          <div class="hint">點擊圖片或「換一張」可更換驗證碼</div>
        </div>

        <div class="done-banner"  id="done-banner"></div>
        <div class="results-wrap" id="results-wrap">
          <div class="results-title">兌換結果</div>
          <div id="results-list"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-tan" id="restart-btn" style="display:none;">再次兌換</button>
          <button class="btn btn-red" id="stop-btn">中止</button>
        </div>
      </div>

      <div class="cors-box" id="cors-warning">
        <strong>跨域錯誤（CORS）</strong>：無法從本機直接呼叫 API。<br>
        請改用 Tampermonkey userscript 方式在官方頁面執行，或以
        <code>--disable-web-security</code> 旗標啟動 Chrome。
      </div>
    </div>
  </div>

  <!-- ══ 右側禮包碼列表 ══ -->
  <div class="panel aside-panel">
    <div class="panel-header">
      <h2>禮包碼</h2>
    </div>
    <div class="panel-body" style="padding:14px 12px 12px;">

      <!-- 社群推薦碼 -->
      <div id="community-section">
        <div class="section-label">社群推薦碼</div>
        <div id="community-list">
          <div id="community-loading">載入中…</div>
        </div>
        <button id="add-code-btn" class="btn-add-link">＋ 新增禮包碼</button>
      </div>

      <hr class="panel-divider">

      <!-- 常見碼 -->
      <div class="section-label">常見碼</div>
      <div class="preset-list" id="preset-list">
        <!-- 由 JS 產生 -->
      </div>
      <div class="preset-hint">點擊選取，<br>自動加入兌換清單</div>
    </div>
  </div>

</div><!-- /layout -->

<script>
  /* ── 禮包碼清單（可自行增減）── */
  const PRESETS = [
    'TOP2026',
    'DICE888',
    'DICE666',
    'TOPDICE666',
  ];

  const API_BASE = 'https://prod-mail.habbyservice.com/roll';
  const ERR = {
    20001:'參數錯誤', 20002:'驗證碼錯誤，請重試',
    20003:'玩家 ID 無效', 20401:'兌換碼無效',
    20402:'兌換碼已被使用', 20403:'兌換碼已過期',
    30001:'伺服器繁忙，請稍後'
  };

  const $ = id => document.getElementById(id);
  const inputSection   = $('input-section');
  const processSection = $('process-section');
  const uidInput       = $('uid-input');
  const codesInput     = $('codes-input');
  const startBtn       = $('start-btn');
  const progressFill   = $('progress-fill');
  const progressText   = $('progress-text');
  const captchaPanel   = $('captcha-panel');
  const currentCode    = $('current-code');
  const captchaImg     = $('captcha-img');
  const refreshBtn     = $('refresh-btn');
  const captchaInput   = $('captcha-input');
  const submitBtn      = $('submit-btn');
  const skipBtn        = $('skip-btn');
  const doneBanner     = $('done-banner');
  const resultsWrap    = $('results-wrap');
  const resultsList    = $('results-list');
  const restartBtn     = $('restart-btn');
  const stopBtn        = $('stop-btn');
  const corsWarning    = $('cors-warning');
  const presetList     = $('preset-list');

  /* ── 取得 textarea 中的碼（陣列）── */
  function getCodes() {
    return codesInput.value.split('\n').map(s => s.trim()).filter(Boolean);
  }

  /* ── 把陣列寫回 textarea ── */
  function setCodes(arr) {
    codesInput.value = arr.join('\n');
  }

  /* ── 同步所有按鈕的 active 狀態 ── */
  function syncPresets() {
    const current = new Set(getCodes());
    presetList.querySelectorAll('.preset-item').forEach(el => {
      el.classList.toggle('active', current.has(el.dataset.code));
      el.querySelector('.preset-check').textContent =
        current.has(el.dataset.code) ? '✓' : '+';
    });
  }

  /* ── 建立禮包碼列表 ── */
  PRESETS.forEach(code => {
    const item = document.createElement('div');
    item.className = 'preset-item';
    item.dataset.code = code;
    item.innerHTML = `
      <span class="preset-check">+</span>
      <span class="preset-code-text">${code}</span>`;

    item.onclick = () => {
      const codes = getCodes();
      const idx = codes.indexOf(code);
      if (idx === -1) {
        codes.push(code);          // 加入
      } else {
        codes.splice(idx, 1);      // 移除
      }
      setCodes(codes);
      syncPresets();
    };

    presetList.appendChild(item);
  });

  /* textarea 手動輸入時也同步按鈕狀態 */
  codesInput.addEventListener('input', syncPresets);

  /* ── 社群推薦碼（Google 試算表）── */
  const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRGzHNFYH9B1EBYeBEVv0ydevJJBKITWK83D4i_ZqPsz3XIDzxEwdz84BJxTpjAqjbMXZIaj8oBMItU/pub?gid=0&single=true&output=csv';
  const FORM_URL  = ''; // 建立 Google 表單後填入網址

  function parseCSV(text) {
    return text.trim().split('\n').map(line => {
      const cols = []; let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += ch;
      }
      cols.push(cur.trim());
      return cols;
    });
  }

  function renderCommunity(rows) {
    const list = $('community-list');
    list.innerHTML = '';
    if (!rows.length) {
      list.innerHTML = '<div id="community-loading">目前沒有社群碼</div>';
      return;
    }
    rows.forEach(([ts, code, , status]) => {
      if (!code) return;
      const isExpired  = status === '已失效';
      const isValid    = status === '有效';
      const badgeClass = isExpired ? 'badge-expired' : isValid ? 'badge-valid' : 'badge-unknown';
      const badgeText  = isExpired ? '已失效'        : isValid ? '有效'        : '未驗證';
      const date = ts ? ts.split(' ')[0] : '';

      const item = document.createElement('div');
      item.className = 'community-item' + (isExpired ? ' expired' : '');
      item.innerHTML = `
        <div class="comm-top">
          <span class="comm-badge ${badgeClass}">${badgeText}</span>
          <span class="comm-code">${code}</span>
        </div>
        ${date ? '<div class="comm-meta">' + date + '</div>' : ''}`;

      if (!isExpired) {
        item.onclick = () => {
          const codes = getCodes();
          if (!codes.includes(code)) { codes.push(code); setCodes(codes); syncPresets(); }
        };
      }
      list.appendChild(item);
    });
  }

  async function loadCommunity() {
    try {
      const res  = await fetch(SHEET_CSV);
      const text = await res.text();
      const rows = parseCSV(text).slice(1).filter(r => r[1] && r[1].trim());
      renderCommunity(rows);
    } catch(e) {
      const el = $('community-loading');
      if (el) el.textContent = '無法載入社群碼';
    }
  }

  const addCodeBtn = $('add-code-btn');
  if (FORM_URL) {
    addCodeBtn.onclick = () => window.open(FORM_URL, '_blank');
  } else {
    addCodeBtn.style.display = 'none';
  }

  loadCommunity();

  /* ── API helpers ── */
  function formatUid(uid) {
    uid = uid.replace(/\s/g, '');
    return uid.includes('-') ? uid.split('-')[1] : uid;
  }

  async function fetchCaptcha() {
    const r = await fetch(`${API_BASE}/api/v1/captcha/generate`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'
    });
    return (await r.json()).data.captchaId;
  }

  function loadCaptchaImg(id) {
    captchaImg.src = `${API_BASE}/api/v1/captcha/image/${id}?t=${Date.now()}`;
  }

  async function claimCode(userId, giftCode, captcha, captchaId) {
    const r = await fetch(`${API_BASE}/api/v1/giftcode/claim`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ userId, giftCode, captcha, captchaId })
    });
    return r.json();
  }

  function addResult(code, type, msg) {
    resultsWrap.style.display = 'block';
    const el = document.createElement('div');
    el.className = `result-item ${type}`;
    el.innerHTML = `<div><div class="result-code">${code}</div><div class="result-msg">${msg}</div></div>`;
    resultsList.appendChild(el);
    resultsList.scrollTop = resultsList.scrollHeight;
  }

  function setProgress(cur, tot) {
    progressFill.style.width = tot ? `${Math.round(cur/tot*100)}%` : '0%';
    progressText.textContent = `進度 ${cur} / ${tot}`;
  }

  /* ── 主流程 ── */
  let stopRequested = false;

  async function runAll(codes, rawUid) {
    const userId = formatUid(rawUid);

    for (let i = 0; i < codes.length; i++) {
      if (stopRequested) break;
      const code = codes[i];
      setProgress(i + 1, codes.length);
      currentCode.textContent = code;
      captchaInput.value = '';
      submitBtn.disabled = false;
      submitBtn.textContent = '確認兌換';

      let captchaId;
      try {
        captchaId = await fetchCaptcha();
        loadCaptchaImg(captchaId);
      } catch (e) {
        if (e.name === 'TypeError') corsWarning.style.display = 'block';
        addResult(code, 'fail', '驗證碼載入失敗：' + e.message);
        continue;
      }

      const reload = async () => {
        try {
          captchaId = await fetchCaptcha();
          loadCaptchaImg(captchaId);
          captchaInput.value = '';
          captchaInput.focus();
        } catch(_) {}
      };
      refreshBtn.onclick = reload;
      captchaImg.onclick  = reload;

      await new Promise(resolve => {
        submitBtn.onclick = async () => {
          const val = captchaInput.value.trim();
          if (!val) { captchaInput.classList.add('error'); captchaInput.focus(); return; }
          captchaInput.classList.remove('error');
          submitBtn.disabled = true;
          submitBtn.textContent = '提交中…';

          try {
            const res = await claimCode(userId, code, val, captchaId);
            if (res.code === 0) {
              addResult(code, 'success', '兌換成功，獎勵已送至信箱');
              resolve();
            } else if (res.code === 20002) {
              addResult(code, 'fail', '驗證碼錯誤，已自動更新');
              await reload();
              submitBtn.disabled = false;
              submitBtn.textContent = '確認兌換';
            } else {
              addResult(code, 'fail', ERR[res.code] || `錯誤 ${res.code}`);
              resolve();
            }
          } catch(e) {
            if (e.name === 'TypeError') corsWarning.style.display = 'block';
            addResult(code, 'fail', '請求失敗：' + e.message);
            resolve();
          }
        };

        skipBtn.onclick = () => { addResult(code, 'skipped', '已跳過'); resolve(); };
      });

      if (stopRequested) break;
    }

    captchaPanel.style.display = 'none';
    submitBtn.style.display    = 'none';
    skipBtn.style.display      = 'none';
    restartBtn.style.display   = 'inline-flex';
    stopBtn.textContent        = '返回';
    stopBtn.className          = 'btn btn-ghost';

    const ok = resultsList.querySelectorAll('.result-item.success').length;
    doneBanner.textContent = stopRequested
      ? `已中止，成功兌換 ${ok} 組`
      : `全部完成！成功兌換 ${ok} / ${codes.length} 組`;
    doneBanner.style.display = 'block';
    setProgress(codes.length, codes.length);
  }

  startBtn.onclick = () => {
    const uid = uidInput.value.trim();
    const raw = codesInput.value.trim();
    uidInput.classList.toggle('error', !uid);
    codesInput.classList.toggle('error', !raw);
    if (!uid || !raw) return;

    const codes = raw.split('\n').map(s => s.trim()).filter(Boolean);
    if (!codes.length) return;

    stopRequested = false;
    resultsList.innerHTML     = '';
    resultsWrap.style.display = 'none';
    doneBanner.style.display  = 'none';
    corsWarning.style.display = 'none';
    captchaPanel.style.display = 'block';
    submitBtn.style.display    = 'inline-flex';
    skipBtn.style.display      = 'inline-flex';
    restartBtn.style.display   = 'none';
    stopBtn.textContent        = '中止';
    stopBtn.className          = 'btn btn-red';

    inputSection.style.display   = 'none';
    processSection.style.display = 'block';
    runAll(codes, uid);
  };

  stopBtn.onclick = () => {
    if (stopBtn.textContent === '中止') {
      stopRequested = true;
      skipBtn.click();
    } else {
      inputSection.style.display   = 'block';
      processSection.style.display = 'none';
      syncPresets();
    }
  };

  restartBtn.onclick = () => {
    inputSection.style.display   = 'block';
    processSection.style.display = 'none';
    syncPresets();
  };

  captchaInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });
</script>
</body>
</html>
